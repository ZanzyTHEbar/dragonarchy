services:
  openfortivpn:
    build:
      context: .
      dockerfile: Containerfile
    image: ghcr.io/daofficialwizard/openfortivpn:latest
    container_name: openfortivpn
    network_mode: host
    privileged: true
    pid: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/ppp:/dev/ppp
    volumes:
      - ./config/openfortivpn.conf:/etc/openfortivpn/config:ro
      - /etc/resolv.conf:/host/etc/resolv.conf
      - openfortivpn-run:/run/openfortivpn
    environment:
      - VPN_HOST=${VPN_HOST:-}
      - VPN_PORT=${VPN_PORT:-443}
      - VPN_DOMAIN=${VPN_DOMAIN:-avular.dev}
      - VPN_DNS_SERVERS=${VPN_DNS_SERVERS:-10.10.100.50,10.10.100.11}
      - SAML_PORT=${SAML_PORT:-8020}
      - DNS_METHOD=${DNS_METHOD:-auto}
      - AUTO_CONNECT=${AUTO_CONNECT:-false}
      - CONFIG_PATH=${CONFIG_PATH:-/etc/openfortivpn/config}
      - API_TCP_PORT=${API_TCP_PORT:-8080}
      - API_UNIX_SOCKET=${API_UNIX_SOCKET:-/run/openfortivpn/api.sock}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  openfortivpn-run:

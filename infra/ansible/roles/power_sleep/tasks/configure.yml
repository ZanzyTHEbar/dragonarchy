---
- name: Ensure power_sleep parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: >-
    {{
      power_sleep_managed_paths
      | map(attribute='dest')
      | map('dirname')
      | unique
      | list
    }}

- name: Install power_sleep managed files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop: "{{ power_sleep_managed_paths }}"

- name: Ensure power_sleep services are enabled and started
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ power_sleep_managed_services }}"

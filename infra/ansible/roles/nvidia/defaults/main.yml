---
nvidia_enabled: true
nvidia_bootloader_helper_src: "{{ playbook_dir }}/../../../scripts/lib/bootloader.sh"
nvidia_bootloader_helper_path: /usr/local/libexec/dotfiles/bootloader.sh

nvidia_packages_by_platform:
  arch:
    - nvidia-dkms
    - nvidia-utils

nvidia_conflicting_arch_packages:
  - linux-cachyos-lts-nvidia-open
  - linux-cachyos-nvidia-open

nvidia_modules:
  - nvidia
  - nvidia_modeset
  - nvidia_uvm
  - nvidia_drm

nvidia_kernel_params:
  - nvidia-drm.modeset=1

nvidia_modprobe_src_dir_by_host:
  goldendragon: hosts/goldendragon/etc/modprobe.d

---
- name: Ensure NVIDIA modules-load directory exists
  ansible.builtin.file:
    path: /etc/modules-load.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install NVIDIA modules-load configuration
  ansible.builtin.copy:
    dest: /etc/modules-load.d/nvidia.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for module in nvidia_modules %}
      {{ module }}
      {% endfor %}

- name: Ensure NVIDIA modprobe directory exists
  ansible.builtin.file:
    path: /etc/modprobe.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install NVIDIA modprobe configuration
  ansible.builtin.copy:
    src: "{{ nvidia_legacy_root }}/etc/modprobe.d/{{ item }}"
    dest: "/etc/modprobe.d/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - nvidia.conf
    - nvidia-drm.conf

- name: Persist NVIDIA kernel parameters
  ansible.builtin.shell: |
    set -euo pipefail
    source "{{ nvidia_bootloader_helper }}"
    boot_append_kernel_params "{{ nvidia_kernel_params | join(' ') }}"
    boot_rebuild_if_changed
  args:
    executable: /bin/bash
  changed_when: false

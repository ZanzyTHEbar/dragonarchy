---
- name: Ensure SDDM theme destination exists
  ansible.builtin.file:
    path: /usr/share/sddm/themes
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install managed SDDM themes
  ansible.builtin.copy:
    src: "{{ sddm_theme_source_dir }}"
    dest: /usr/share/sddm/themes/
    owner: root
    group: root
    mode: preserve
  notify: Restart sddm

- name: Ensure SDDM configuration directory exists
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure active SDDM theme
  ansible.builtin.copy:
    dest: /etc/sddm.conf.d/10-theme.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Theme]
      Current={{ sddm_theme }}
  notify: Restart sddm

- name: Enable and start SDDM
  ansible.builtin.service:
    name: sddm
    enabled: true
    state: started

---
- name: Assert base timezone is defined
  ansible.builtin.assert:
    that:
      - base_timezone is defined
      - base_timezone | length > 0
    fail_msg: "base_timezone must be defined for the base role."

- name: Assert base polkit admin identities are defined
  ansible.builtin.assert:
    that:
      - base_polkit_admin_identities is defined
      - base_polkit_admin_identities | length > 0
    fail_msg: "base_polkit_admin_identities must define at least one polkit admin identity."

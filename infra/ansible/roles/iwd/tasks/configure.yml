---
- name: Ensure iwd parent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: >-
    {{
      iwd_managed_paths
      | map(attribute='dest')
      | map('dirname')
      | unique
      | list
    }}

- name: Install iwd managed files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop: "{{ iwd_managed_paths }}"

- name: Ensure iwd service is enabled and started
  ansible.builtin.systemd_service:
    name: "{{ iwd_service_name }}"
    enabled: true
    state: started

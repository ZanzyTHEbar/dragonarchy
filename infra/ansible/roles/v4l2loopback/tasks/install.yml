---
- name: Install v4l2loopback packages (legacy override; default is manifest via packages role)
  ansible.builtin.package:
    name: "{{ v4l2loopback_packages_by_platform[host_platform_family][inventory_hostname] }}"
    state: present
  when: v4l2loopback_packages_by_platform[host_platform_family][inventory_hostname] | default([]) | length > 0

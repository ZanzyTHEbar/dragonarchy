---
- name: Check that openfortivpn binary is installed
  ansible.builtin.stat:
    path: /usr/bin/openfortivpn
  register: openfortivpn_binary

- name: Assert OpenFortiVPN tranche-5 metadata exists
  ansible.builtin.assert:
    that:
      - openfortivpn_enabled | bool
      - host_platform_family is defined
      - host_platform_family in openfortivpn_packages_by_platform
      - host_capabilities is defined
      - "'fortinet_vpn' in host_capabilities"
      - "'resolved' in host_capabilities"
      - managed_users is defined
      - managed_users | length > 0
      - openfortivpn_binary.stat.exists
    fail_msg: >-
      Host '{{ inventory_hostname }}' does not satisfy the OpenFortiVPN tranche-5 contract.
      Required: openfortivpn_enabled=true, host_platform_family defined and in openfortivpn_packages_by_platform,
      'fortinet_vpn' in host_capabilities, 'resolved' in host_capabilities,
      managed_users defined and non-empty, inventory_hostname in openfortivpn_helper_src_by_host
      and openfortivpn_unit_src_dir_by_host, and /usr/bin/openfortivpn must exist.

- name: Set OpenFortiVPN primary user
  ansible.builtin.set_fact:
    openfortivpn_primary_user: "{{ managed_users[0].name }}"

- name: Set OpenFortiVPN host payload root
  ansible.builtin.set_fact:
    openfortivpn_role_files_root: "{{ openfortivpn_host_source_dir }}/{{ inventory_hostname }}"

- name: Check OpenFortiVPN DNS helper source
  ansible.builtin.stat:
    path: "{{ openfortivpn_role_files_root }}/dotfiles/.local/bin/avular-vpn-dns"
  delegate_to: localhost
  become: false
  changed_when: false
  register: openfortivpn_helper_src

- name: Assert OpenFortiVPN DNS helper source exists
  ansible.builtin.assert:
    that:
      - openfortivpn_helper_src.stat.exists
    fail_msg: >-
      Host '{{ inventory_hostname }}' is missing the avular-vpn-dns source payload.

- name: Check OpenFortiVPN systemd unit sources
  ansible.builtin.stat:
    path: "{{ openfortivpn_role_files_root }}/etc/systemd/system/{{ item }}"
  delegate_to: localhost
  become: false
  changed_when: false
  loop:
    - openfortivpn.service
    - openfortivpn-cleanup.service
  register: openfortivpn_unit_srcs

- name: Assert OpenFortiVPN systemd unit sources exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: >-
      Host '{{ inventory_hostname }}' is missing the OpenFortiVPN unit source '{{ item.item }}'.
  loop: "{{ openfortivpn_unit_srcs.results }}"

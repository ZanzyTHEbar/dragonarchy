---
openfortivpn_enabled: true
openfortivpn_group: openfortivpn

# Packages are owned by scripts/install/deps.manifest.toml (openfortivpn) and
# installed by the packages role.
openfortivpn_packages_by_platform:
  arch: []

openfortivpn_seed_config: |
  ### configuration file for openfortivpn, see man openfortivpn(1) ###

  host = vpn.avular.com
  port = 443
  # username = you@example.com   # optional, can prompt
  # password = yourpassword      # optional, better to prompt
  saml-login = 8020              # or any free port; triggers browser SAML flow
  #trusted-cert = <sha256_hash>  # get this first
  # realm = <if needed; try without>
  # set-dns = 1                  # auto-set DNS if possible
  # set-routes = 1
  # pppd-use-peerdns = 1

openfortivpn_host_source_dir: "{{ playbook_dir | dirname | dirname | dirname }}/hosts"

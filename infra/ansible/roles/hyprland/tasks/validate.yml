---
- name: Assert Hyprland tranche-3 metadata exists
  ansible.builtin.assert:
    that:
      - hyprland_enabled | bool
      - host_desktop_stack is defined
      - host_desktop_stack == 'hyprland'
      - host_platform_family is defined
      - host_platform_family in hyprland_session_packages_by_platform
    fail_msg: >-
      Host '{{ inventory_hostname }}' does not satisfy the Hyprland tranche-3 contract.

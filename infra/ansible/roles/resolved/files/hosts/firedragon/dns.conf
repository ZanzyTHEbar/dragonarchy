[Resolve]
# Keep the home resolver first, but leave public resolvers in the primary list
# so firedragon can still resolve names if the local DNS server is down.
DNS=192.168.0.218 1.1.1.1 8.8.8.8

# Do not set Domains=~. here. That would hard-pin all lookups to the home DNS
# path and make off-network behavior brittle.
# DNSOverTLS=opportunistic
# DNSSEC=no

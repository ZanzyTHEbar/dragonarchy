---
intel_gpu_enabled: true
intel_gpu_bootloader_helper_src: "{{ playbook_dir }}/../../../scripts/lib/bootloader.sh"
intel_gpu_bootloader_helper_path: /usr/local/libexec/dotfiles/bootloader.sh

# Packages are owned by scripts/install/deps.manifest.toml and installed by the packages role.
intel_gpu_packages_by_platform:
  arch: []

intel_gpu_modules:
  - i915
  - crc32c

intel_gpu_kernel_params:
  - i915.modeset=1

intel_gpu_host_source_dir: "{{ playbook_dir | dirname | dirname }}/../../hosts"

---
- name: Assert fingerprint tranche-4 metadata exists
  ansible.builtin.assert:
    that:
      - fingerprint_enabled | bool
      - host_platform_family is defined
      - host_platform_family in fingerprint_packages_by_platform
      - fingerprint_usb_id is defined
      - fingerprint_usb_id is match('^[0-9a-fA-F]{4}:[0-9a-fA-F]{4}$')
      - host_capabilities is defined
      - "'fingerprint' in host_capabilities"
      - inventory_hostname in fingerprint_sleep_hook_src_by_host
      - inventory_hostname in fingerprint_hyprlock_pam_src_by_host
    fail_msg: >-
      Host '{{ inventory_hostname }}' does not satisfy the fingerprint tranche-4 contract.

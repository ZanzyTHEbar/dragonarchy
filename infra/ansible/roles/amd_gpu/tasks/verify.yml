---
- name: Determine whether AMD Vulkan tooling is part of the host contract
  ansible.builtin.set_fact:
    amd_gpu_expect_vulkaninfo: >-
      {{
        'vulkan-tools' in
        (amd_gpu_packages_by_platform[host_platform_family][inventory_hostname] | default([]))
      }}

- name: Check AMD Vulkan command availability
  ansible.builtin.shell: "command -v vulkaninfo"
  register: amd_gpu_vulkaninfo_command
  changed_when: false
  failed_when: false
  when: amd_gpu_expect_vulkaninfo

- name: Assert AMD Vulkan command exists
  ansible.builtin.assert:
    that:
      - amd_gpu_vulkaninfo_command.rc == 0
    fail_msg: "Expected vulkaninfo to be available."
  when: amd_gpu_expect_vulkaninfo

- name: Check AMD modules-load file
  ansible.builtin.stat:
    path: /etc/modules-load.d/amd.conf
  register: amd_gpu_modules_load_file

- name: Assert AMD modules-load file exists
  ansible.builtin.assert:
    that:
      - amd_gpu_modules_load_file.stat.exists
    fail_msg: "Expected /etc/modules-load.d/amd.conf to exist."

- name: Check AMD GPU modprobe files
  ansible.builtin.stat:
    path: "/etc/modprobe.d/{{ item | basename }}"
  loop: "{{ amd_gpu_modprobe_sources }}"
  register: amd_gpu_modprobe_files

- name: Assert AMD GPU modprobe files exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Expected /etc/modprobe.d/{{ item.item | basename }} to exist."
  loop: "{{ amd_gpu_modprobe_files.results }}"

- name: Check AMD GPU service files
  ansible.builtin.stat:
    path: "/etc/systemd/system/{{ item.path | basename }}"
  loop: "{{ amd_gpu_service_files.files }}"
  register: amd_gpu_service_stats
  when: amd_gpu_service_files.matched | default(0) | int > 0

- name: Assert AMD GPU service files exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Expected /etc/systemd/system/{{ item.item.path | basename }} to exist."
  loop: "{{ amd_gpu_service_stats.results }}"
  when: amd_gpu_service_files.matched | default(0) | int > 0

- name: Check persisted AMD GPU kernel parameter
  ansible.builtin.shell: |
    grep -qw 'amdgpu.modeset=1' /proc/cmdline \
      || grep -Rqs 'amdgpu.modeset=1' /etc/kernel/cmdline /etc/default/grub /etc/limine-entry-tool.d /boot/loader/entries /boot/limine.conf /boot/limine.cfg /boot/limine/limine.conf /boot/limine/limine.cfg
  register: amd_gpu_kernel_param_check
  changed_when: false

- name: Assert persisted AMD GPU kernel parameter exists
  ansible.builtin.assert:
    that:
      - amd_gpu_kernel_param_check.rc == 0
    fail_msg: "Expected AMD GPU kernel parameter amdgpu.modeset=1 to be persisted."

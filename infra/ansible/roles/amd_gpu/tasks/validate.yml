---
- name: Assert AMD GPU tranche-4 metadata exists
  ansible.builtin.assert:
    that:
      - amd_gpu_enabled | bool
      - host_platform_family is defined
      - host_platform_family in amd_gpu_packages_by_platform
      - host_gpu_stack is defined
      - "'amd-gpu' in host_gpu_stack"
      - inventory_hostname in amd_gpu_packages_by_platform[host_platform_family]
      - inventory_hostname in amd_gpu_host_src_dir_by_host
    fail_msg: >-
      Host '{{ inventory_hostname }}' does not satisfy the AMD GPU tranche-4 contract.

- name: Set AMD GPU role-local host payload root
  ansible.builtin.set_fact:
    amd_gpu_role_files_root: "{{ role_path }}/files/{{ amd_gpu_host_src_dir_by_host[inventory_hostname] }}"

- name: Check host-specific AMD GPU modprobe sources
  ansible.builtin.stat:
    path: "{{ amd_gpu_role_files_root }}/etc/modprobe.d/{{ item }}"
  delegate_to: localhost
  become: false
  changed_when: false
  loop:
    - amdgpu.conf
    - amdgpu-dragon.conf
  register: amd_gpu_modprobe_source_candidates

- name: Set AMD GPU modprobe sources
  ansible.builtin.set_fact:
    amd_gpu_modprobe_sources: >-
      {{
        amd_gpu_modprobe_source_candidates.results
        | selectattr('stat.exists', 'defined')
        | selectattr('stat.exists', 'equalto', true)
        | map(attribute='item')
        | map('regex_replace', '^(.*)$', amd_gpu_role_files_root ~ '/etc/modprobe.d/\\1')
        | list
      }}

- name: Assert AMD GPU has at least one modprobe source
  ansible.builtin.assert:
    that:
      - amd_gpu_modprobe_sources | length > 0
    fail_msg: >-
      Host '{{ inventory_hostname }}' is missing a managed AMD GPU modprobe source.

---
amd_gpu_enabled: true
amd_gpu_bootloader_helper_src: "{{ playbook_dir }}/../../../scripts/lib/bootloader.sh"
amd_gpu_bootloader_helper_path: /usr/local/libexec/dotfiles/bootloader.sh

# Packages are owned by scripts/install/deps.manifest.toml (see host_dragon_workstation,
# host_firedragon_laptop) and installed by the packages role.
amd_gpu_packages_by_platform:
  arch:
    dragon: []
    firedragon: []

amd_gpu_kernel_params:
  - amdgpu.modeset=1

amd_gpu_host_source_dir: "{{ playbook_dir | dirname | dirname | dirname }}/hosts"

amd_gpu_managed_files_by_host:
  dragon:
    modprobe:
      - amdgpu-dragon.conf
    services: []
    polkit_rules:
      - 90-corectrl.rules
    bootloader_dropins: []
  firedragon:
    modprobe:
      - amdgpu.conf
    services:
      - amdgpu-console-restore.service
      - amdgpu-resume.service
      - amdgpu-suspend.service
    polkit_rules: []
    bootloader_dropins:
      - 10-amdgpu.conf

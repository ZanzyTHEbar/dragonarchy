---
amd_gpu_enabled: true
amd_gpu_bootloader_helper_src: "{{ playbook_dir }}/../../../scripts/lib/bootloader.sh"
amd_gpu_bootloader_helper_path: /usr/local/libexec/dotfiles/bootloader.sh

# Packages are owned by scripts/install/deps.manifest.toml (see host_dragon_workstation,
# host_firedragon_laptop) and installed by the packages role.
amd_gpu_packages_by_platform:
  arch:
    dragon: []
    firedragon: []

amd_gpu_kernel_params:
  - amdgpu.modeset=1

amd_gpu_host_source_dir: "{{ playbook_dir | dirname | dirname }}/../../hosts"

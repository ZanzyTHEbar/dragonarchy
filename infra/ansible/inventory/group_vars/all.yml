---
dotfiles_architecture:
  system_owner: ansible
  user_owner: chezmoi
  migration_stage: hot_paths
  no_fallbacks: true

dotfiles_supported_os_families:
  - Archlinux
  - Debian

dotfiles_supported_distribution_families:
  arch:
    - Archlinux
    - CachyOS
  debian:
    - Debian
    - Ubuntu

dotfiles_group_capability_map:
  tlp: tlp
  fingerprint: fingerprint
  netbird: netbird
  fortinet_vpn: fortinet_vpn
  asus: asus
  hibernation: hibernation

dotfiles_group_gpu_map:
  amd-gpu: amd_gpu
  nvidia: nvidia

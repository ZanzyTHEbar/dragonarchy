name: Validate Dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pkgsolve:
    name: pkgsolve Rust CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --manifest-path tools/pkgsolve/Cargo.toml --check

      - name: Run clippy
        run: cargo clippy --manifest-path tools/pkgsolve/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --manifest-path tools/pkgsolve/Cargo.toml

  shellcheck:
    name: Shellcheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Lint all shell scripts
        run: |
          scripts=()
          while IFS= read -r -d '' script; do
            scripts+=("$script")
          done < <(find scripts/lib/ scripts/install/ infra/packer/scripts/ infra/ansible/ -name '*.sh' -type f -print0)

          while IFS= read -r -d '' script; do
            scripts+=("$script")
          done < <(find hosts/ -maxdepth 2 -name setup.sh -type f -print0)

          while IFS= read -r -d '' script; do
            scripts+=("$script")
          done < <(find infra/ -maxdepth 1 -name '*.sh' -type f -print0)

          for script in \
            install \
            install.sh \
            infra/ansible/run-playbook.sh \
            infra/chezmoi/bin/chezmoi-sync \
            scripts/tools/sync-bin-links \
            hosts/goldendragon/etc/acpi/disable-wakeup.sh \
            hosts/goldendragon/etc/systemd/system-sleep/99-fprintd-reset.sh \
            hosts/goldendragon/scripts/fingerprint/restart-fprintd.sh; do
            [[ -f "$script" ]] && scripts+=("$script")
          done

          printf '%s\0' "${scripts[@]}" | xargs -0 shellcheck -x -s bash

  ansible-syntax:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ansible

      - name: Syntax check foundation playbook
        working-directory: infra/ansible
        run: ansible-playbook -i inventory/hosts.yml playbooks/foundation.yml --syntax-check

      - name: Syntax check full site playbook
        working-directory: infra/ansible
        run: ansible-playbook -i inventory/hosts.yml playbooks/site.yml --syntax-check

  shell-test-suite:
    name: Shell Test Suite (Bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bats tests
        run: |
          ./tests/shell/vendor/bin/bats tests/shell/run-playbook.bats

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check all shell scripts
        run: |
          scripts=()
          while IFS= read -r -d '' script; do
            scripts+=("$script")
          done < <(find . -name '*.sh' -type f -print0)

          for script in install infra/ansible/run-playbook.sh infra/chezmoi/bin/chezmoi-sync scripts/tools/sync-bin-links; do
            [[ -f "$script" ]] && scripts+=("$script")
          done

          exit_code=0
          for script in "${scripts[@]}"; do
            if ! bash -n "$script" 2>&1; then
              echo "FAIL: $script"
              exit_code=1
            fi
          done
          exit "$exit_code"

  validate:
    name: Validate System (JSON)
    runs-on: ubuntu-latest
    needs: [syntax-check, shell-test-suite]
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq stow zsh git

      - name: Run validation in JSON mode
        id: validate
        run: |
          # Source logging so validate.sh can find its dependencies
          chmod +x scripts/install/validate.sh

          # Run validation — allow non-zero exit (some checks will fail in CI)
          set +e
          output=$(bash scripts/install/validate.sh --json 2>/tmp/validate-stderr.log)
          rc=$?
          set -e

          echo "$output" | jq . || {
            echo "::warning::validate.sh did not produce valid JSON"
            echo "::warning::stderr output:"
            cat /tmp/validate-stderr.log 2>/dev/null || true
            echo '{"status":"error","passed":0,"failed":0,"warnings":0,"results":[]}' > /tmp/validate.json
            exit 0
          }

          echo "$output" > /tmp/validate.json

          # Extract counts
          passed=$(echo "$output" | jq '.passed')
          failed=$(echo "$output" | jq '.failed')
          warnings=$(echo "$output" | jq '.warnings')
          status=$(echo "$output" | jq -r '.status')

          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          echo "warnings=$warnings" >> "$GITHUB_OUTPUT"

          echo "### Validation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | $passed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | $failed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Warnings | $warnings |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | $status |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: /tmp/validate.json

  manifest-check:
    name: Validate TOML Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          YQ_VERSION="v4.44.6"
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Validate manifest TOML syntax
        run: yq eval '.' scripts/install/deps.manifest.toml > /dev/null

      - name: Check bundle references resolve to valid groups
        run: |
          manifest="scripts/install/deps.manifest.toml"
          exit_code=0

          for bundle in $(yq '.bundles | keys | .[]' "$manifest"); do
            for group in $(yq ".bundles.${bundle}.groups[]" "$manifest"); do
              # Check if group exists under any platform/manager
              found=$(yq ".. | select(has(\"${group}\")) | path | .[0]" "$manifest" 2>/dev/null | head -1)
              if [[ -z "$found" ]]; then
                echo "ERROR: Bundle '$bundle' references unknown group '$group'"
                exit_code=1
              fi
            done
          done

          exit "$exit_code"

  debian-headless-smoke:
    name: Debian Headless Smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [syntax-check, manifest-check, pkgsolve]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-bookworm
            base_image: debian:bookworm-slim
          - name: ubuntu-24-04
            base_image: ubuntu:24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build headless smoke container
        run: |
          docker build \
            --progress=plain \
            --build-arg BASE_IMAGE="${{ matrix.base_image }}" \
            -f tests/docker/debian-headless/Dockerfile \
            .

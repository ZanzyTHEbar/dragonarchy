name: Debian-Family VM E2E

on:
  workflow_dispatch:

jobs:
  debian-family-vm:
    name: Debian-Family VM E2E (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian-bookworm-headless
            image_url: https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2
            host: headless
            bundle: minimal
            validate_bundle: minimal
            skip_first_run_command: false
          - name: debian-forky-desktop-base
            image_url: https://cloud.debian.org/images/cloud/forky/daily/latest/debian-14-genericcloud-amd64-daily.qcow2
            host: desktop
            bundle: desktop_base
            validate_bundle: desktop_base
            skip_first_run_command: true
            install_extra_flags: --no-cursor --no-post-setup --no-first-run
          - name: ubuntu-resolute-desktop-base
            image_url: https://cloud-images.ubuntu.com/resolute/current/resolute-server-cloudimg-amd64.img
            host: desktop
            bundle: desktop_base
            validate_bundle: desktop_base
            skip_first_run_command: true
            install_extra_flags: --no-cursor --no-post-setup --no-first-run

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install VM dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cloud-image-utils \
            curl \
            jq \
            openssh-client \
            qemu-system-x86 \
            qemu-utils

      - name: Prepare artifact directory
        run: mkdir -p "$RUNNER_TEMP/debian-vm-e2e-artifacts"

      - name: Run Debian VM E2E
        run: |
          EXTRA_ARGS=()
          for flag in ${{ matrix.install_extra_flags || '' }}; do
            EXTRA_ARGS+=(--install-extra-flag "$flag")
          done

          if [[ "${{ matrix.skip_first_run_command }}" == "true" ]]; then
            EXTRA_ARGS+=(--skip-first-run-command)
          fi

          bash ./scripts/ci/debian-vm-e2e.sh \
            --artifact-dir "$RUNNER_TEMP/debian-vm-e2e-artifacts/${{ matrix.name }}" \
            --image-url "${{ matrix.image_url }}" \
            --host "${{ matrix.host }}" \
            --bundle "${{ matrix.bundle }}" \
            --validate-bundle "${{ matrix.validate_bundle }}" \
            "${EXTRA_ARGS[@]}"

      - name: Upload VM E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debian-vm-e2e-artifacts-${{ matrix.name }}
          path: ${{ runner.temp }}/debian-vm-e2e-artifacts/${{ matrix.name }}
          if-no-files-found: warn

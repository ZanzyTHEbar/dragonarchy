[platforms.debian.script.hyprland_core]
requires_features = ["hyprland"]
# Deferred/default Debian-family Hyprland core group. Release/provider-specific
# archive tracks add compositor/session packages through dedicated track groups.
packages = []

[platforms.debian.script.creative_aur]
requires_features = ["creative_vendor_optin"]
# Official vendor-backed creative extras. REAPER is automatable from the
# published tarball; DaVinci Resolve remains manual because Blackmagic gates the
# download and targets RHEL/CentOS-style environments.
packages = ["reaper"]

[tools.pipx]
packages = ["poetry", "black", "flake8", "mypy"]

# ─── Bundle Compositions ───────────────────────────────────────
# Bundles compose existing groups into named profiles.
# Usage: install-deps.sh --bundle <name>

[bundles.desktop_base]
description = "Shared Hyprland desktop foundation (SMB/fileshare excluded)"
groups = [
    "core_cli",
    "dev",
    "fonts",
    "gui",
    "hyprland_base",
    "hyprland_base_debian_archive",
    "hyprland_base_ubuntu_archive",
    "nemo_core",
    "hyprland_core",
    "hyprland_core_debian_archive",
    "hyprland_core_ubuntu_archive",
    "hyprland_aur",
    "hyprland_aur_debian_archive",
    "hyprland_aur_ubuntu_archive",
]

[bundles.desktop]
description = "Full desktop experience (Hyprland + GUI apps + themes)"
extends = ["desktop_base"]
groups = []

[bundles.desktop_smb]
description = "Full desktop experience with Nemo SMB usershare enabled"
extends = ["desktop_base"]
groups = ["nemo_share"]

[bundles.minimal]
description = "CLI-only server/container setup"
groups = ["core_cli", "dev"]

[bundles.creative]
description = "Desktop + creative/multimedia tools (GIMP, Blender, OBS, Kdenlive, Ardour, etc.)"
extends = ["desktop_base"]
groups = ["creative", "creative_aur"]
